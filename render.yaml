services:
  - type: web
    name: digital-card
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.13"
      - key: WALLETWALLET_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
